name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build:
    name: Build x86_64 musl binary
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release
        run: |
          rustup target add x86_64-unknown-linux-musl
          cargo build --release --target x86_64-unknown-linux-musl
      - name: Verify binary
        run: |
          file target/x86_64-unknown-linux-musl/release/sys-wall
          ls -lh target/x86_64-unknown-linux-musl/release/sys-wall
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sys-wall
          path: target/x86_64-unknown-linux-musl/release/sys-wall
